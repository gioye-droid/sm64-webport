<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SM64 Web Port</title>
<style>
  .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
  div.emscripten { text-align: center; }      
  div.emscripten_border { border: 1px solid black; }
  canvas.emscripten { border: 0px none; }

  .spinner { height: 30px; width: 30px; margin: 20px; display: inline-block; vertical-align: top;
    -webkit-animation: rotation .8s linear infinite;
    -moz-animation: rotation .8s linear infinite;
    -o-animation: rotation .8s linear infinite;
    animation: rotation .8s linear infinite;
    border-left: 5px solid rgb(235, 235, 235);
    border-right: 5px solid rgb(235, 235, 235);
    border-bottom: 5px solid rgb(235, 235, 235);
    border-top: 5px solid rgb(120, 120, 120);
    border-radius: 100%;
    background-color: rgb(189, 215, 46);
  }

  @keyframes rotation { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

  #status { display: inline-block; vertical-align: top; margin-top: 30px; margin-left: 20px; font-weight: bold; color: rgb(120,120,120); }
  #progress { height: 20px; width: 30px; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="emscripten" id="status">Downloading...</div>
<div class="emscripten_border">
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
</div>

<script type="text/javascript">
var statusElement = document.getElementById('status');
var progressElement = document.getElementById('progress');
var spinnerElement = document.getElementById('spinner');

var Module = {
  noInitialRun: true,
  canvas: document.getElementById('canvas'),
  preRun: [],
  postRun: [],
  print: (function() {
    return function(text) { console.log(text); };
  })(),
  printErr: function(text) { console.error(text); },
  setStatus: function(text) {
    statusElement.innerHTML = text || '';
  }
};

// Auto-load the ROM
fetch('https://file.garden/aXN9PJNqeHbDU8np/baserom.z64')
  .then(r => r.arrayBuffer())
  .then(data => {
    if (!Module.FS) Module.FS = FS;
    FS.writeFile('sm64.z64', new Uint8Array(data), {encoding: 'binary'});
    spinnerElement.style.display = 'none';
    statusElement.style.display = 'none';
    Module['callMain'](['--resolution', '640x480', 'sm64.z64']);
  })
  .catch(err => {
    console.error("Failed to load ROM:", err);
    statusElement.innerHTML = 'Failed to load ROM';
  });
</script>

<script async type="text/javascript" src="mupen64plus-ui-console.js"></script>
</body>
</html>
