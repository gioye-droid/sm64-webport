Analog Stick X = A,D
Analog Stick Y = W,S
C Button Up = I
C Button Down = K
C Button Left = J
C Button Right = L
A Button = Z
B Button = X
Z Button = C
L Button = Q
R Button = E
D-Pad Up = Arrow Up
D-Pad Down = Arrow Down
D-Pad Left = Arrow Left
D-Pad Right = Arrow Right
Start Button = Enter

[Core-Settings]
Use External Memory = True
Enable Cheats = False
Save State Directory = /savestates
