[Video-General]
Fullscreen = False
Window Width = 640
Window Height = 480
Vsync = False
Enable Fog = False
Enable Perspective Correction = True
Enable Texture Filter = False
Enable High-Res Textures = False
Enable Framebuffer Emulation = False
Enable Framebuffer Effect = False
Enable Alpha Blending = True
Enable Multi-Sampling = False
Enable Runfast = True
Enable Framerate Counter = False
Enable Wireframe = False
Enable Anisotropic Filtering = 1
Enable Buffer Copy = True

[Video-Enhancements]
Enable Fog = False
Enable Alpha Test = True
Enable Anti-Aliasing = False
Enable Alpha-to-Coverage = False
Enable Texture Sharpening = False
Enable Shader Cache = False

[Audio-General]
